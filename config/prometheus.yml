# Prometheus Configuration for Web Scraper

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'scraper'
    static_configs:
      - targets: ['host.docker.internal:9090']
    metrics_path: '/metrics'
    scrape_interval: 5s

  - job_name: 'redis'
    static_configs:
      - targets: ['scraper-redis:8001']

  - job_name: 'jaeger'
    static_configs:
      - targets: ['scraper-jaeger:14269']
