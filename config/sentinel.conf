# Redis Sentinel Configuration
# 3-node quorum for automatic failover

port 26379

sentinel monitor scraper-master scraper-redis 6379 2
sentinel down-after-milliseconds scraper-master 5000
sentinel failover-timeout scraper-master 60000
sentinel parallel-syncs scraper-master 1

# Auth (set if Redis has a password)
# sentinel auth-pass scraper-master YOUR_PASSWORD
